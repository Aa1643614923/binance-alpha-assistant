const num = (value, digits = 2) => {
  if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
  return Number(value).toLocaleString("en-US", { maximumFractionDigits: digits });
};

const pct = (value, digits = 2) => {
  if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
  return `${Number(value) > 0 ? "+" : ""}${Number(value).toFixed(digits)}%`;
};

const money = (value) => {
  if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
  const v = Number(value);
  if (Math.abs(v) >= 1e9) return `$${(v / 1e9).toFixed(2)}B`;
  if (Math.abs(v) >= 1e6) return `$${(v / 1e6).toFixed(2)}M`;
  if (Math.abs(v) >= 1e3) return `$${(v / 1e3).toFixed(2)}K`;
  return `$${v.toFixed(2)}`;
};

const klass = (value) => (Number(value) > 0 ? "good" : Number(value) < 0 ? "bad" : "warn");

function formatLocalTime(value) {
  if (!value) return "-";
  const date = new Date(value);
  if (Number.isNaN(date.getTime())) return String(value);
  return date.toLocaleString("zh-CN", { hour12: false });
}

  document.getElementById("panel-s").innerHTML = `<h2>稳定刷分推荐</h2><ul>${stableSummary.map((item) => `<li>${item}</li>`).join("")}</ul><table><thead><tr><th>代币</th><th>分数</th><th>24h 成交额</th><th>流动性</th><th>短周期波动</th><th>4h 振幅</th><th>审计</th><th>原因</th></tr></thead><tbody>${report.stable_candidates.recommendations.map((item) => `<tr><td><strong>${item.symbol}</strong></td><td>${num(item.stability_score)}</td><td>${money(item.stable_volume24h || item.alpha_trade_quote_volume24h || item.volume24h)}</td><td>${money(item.liquidity)}</td><td>${pct(item.realized_volatility_pct)}</td><td>${pct(item.amplitude_4h_pct)}</td><td>${item.audit_risk || "-"}</td><td>${stableReason(item)}</td></tr>`).join("")}</tbody></table>`;

  document.getElementById("panel-f").innerHTML = `<h2>合约异动</h2><table><thead><tr><th>Alpha / 合约</th><th>24h 涨跌</th><th>24h 成交额</th><th>资金费率</th><th>5m 持仓变化</th><th>分数</th><th>通知</th><th>原因</th></tr></thead><tbody>${report.futures_alerts.alerts.map((item) => `<tr><td><strong>${item.alpha_symbol}</strong><div class="small muted">${item.futures_symbol}</div></td><td class="${klass(item.price_change_percent_24h)}">${pct(item.price_change_percent_24h)}</td><td>${money(item.quote_volume_24h)}</td><td>${pct(item.funding_bps, 2).replace("%", " bps")}</td><td>${pct(item.open_interest_change_5m_pct)}</td><td>${num(item.alert_score)}</td><td>${item.should_notify ? '<span class="pill bad">建议通知</span>' : '<span class="pill">观察</span>'}</td><td>${(item.reasons || []).join("<br>")}</td></tr>`).join("")}</tbody></table>`;

  document.getElementById("panel-d").innerHTML = `<h2>日报</h2><ul>${report.daily_brief.summary.map((item) => `<li>${item}</li>`).join("")}</ul><div class="grid"><div class="card"><h3>最近 Alpha 上线</h3><ul>${report.daily_brief.recent_alpha_listings.map((item) => `<li><strong>${item.symbol}</strong> · ${item.mul_point}x · ${formatLocalTime(item.listing_time)} · 成交额 ${money(item.volume24h)}</li>`).join("")}</ul></div>${report.daily_brief.official_updates.map((catalog) => `<div class="card"><h3>${catalog.catalog_name}</h3><ul>${catalog.articles.map((article) => `<li><a href="${article.support_url}" target="_blank" rel="noreferrer">${article.title}</a><div class="small muted">${formatLocalTime(article.publish_time)}</div><div class="small">${article.summary || ""}</div></li>`).join("")}</ul></div>`).join("")}</div>`;

  warningsEl.textContent = (report.warnings || []).length ? "提示：部分数据暂时不可用。" : "";
}

async function fetchLatestReport() {
  const candidates = [
    "https://raw.githubusercontent.com/Aa1643614923/binance-alpha-assistant/main/demo/sample_report.json",
    "sample_report.json",
    "latest_report.json",
  ];
  let lastError = null;
  for (const name of candidates) {
    try {
      const response = await fetch(`${name}?t=${Date.now()}`, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      if (!data || !data.generated_at) throw new Error("Invalid report payload");
      report = data;
      renderReport();
      return;
    } catch (error) {
      lastError = error;
    }
  }
  throw lastError || new Error("No report JSON found");
}

refreshBtnEl.addEventListener("click", async () => {
  const originalText = refreshBtnEl.textContent;
  refreshBtnEl.disabled = true;
  refreshBtnEl.textContent = "刷新中...";
  try {
    await fetchLatestReport();
  } catch (error) {
    warningsEl.textContent = "提示：刷新失败，请稍后再试。";
  } finally {
    refreshBtnEl.disabled = false;
    refreshBtnEl.textContent = originalText;
  }
});

document.querySelectorAll(".tab[data-tab]").forEach((button) => {
  button.addEventListener("click", () => {
    document.querySelectorAll(".tab[data-tab]").forEach((node) => node.classList.remove("active"));
    document.querySelectorAll(".panel").forEach((node) => node.classList.remove("active"));
    button.classList.add("active");
    document.getElementById(`panel-${button.dataset.tab}`).classList.add("active");
  });
});

renderReport();
fetchLatestReport().catch(() => {
  warningsEl.textContent = "提示：当前显示的是最近一次可用数据。";
});
</script>
</body>
</html>
