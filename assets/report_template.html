<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>币安 Alpha 助手</title>
  <style>
    body{margin:0;background:#0b1020;color:#edf2ff;font-family:system-ui,sans-serif}
    .wrap{max-width:1200px;margin:0 auto;padding:24px}
    .hero,.cards,.tabs,.grid{display:grid;gap:12px}
    .hero{grid-template-columns:1fr auto;align-items:start}
    .actions{display:grid;gap:8px;justify-items:end}
    .cards{grid-template-columns:repeat(auto-fit,minmax(220px,1fr));margin:18px 0}
    .card,.panel{background:#121a36;border:1px solid #25325f;border-radius:16px;padding:16px}
    .label{color:#95a2c6;font-size:13px}
    .value{font-size:28px;font-weight:700;margin-top:8px}
    .tabs{grid-template-columns:repeat(4,1fr);margin-bottom:12px}
    .tab{padding:10px 12px;border-radius:999px;border:1px solid #2b3a67;background:#101734;color:#edf2ff;cursor:pointer}
    .tab.active{border-color:#f3ba2f;color:#f3ba2f}
    .panel{display:none}
    .panel.active{display:block}
    table{width:100%;border-collapse:collapse;font-size:14px}
    th,td{padding:10px;border-bottom:1px solid rgba(255,255,255,.08);text-align:left;vertical-align:top}
    .muted{color:#95a2c6}
    .good{color:#31d0aa}
    .bad{color:#ff6b81}
    .warn{color:#ffb454}
    .grid{grid-template-columns:repeat(auto-fit,minmax(320px,1fr))}
    a{color:#8cc4ff;text-decoration:none}
    ul{padding-left:20px}
    .small{font-size:12px}
    .pill{display:inline-block;border:1px solid #2b3a67;border-radius:999px;padding:3px 8px}
    @media (max-width: 768px){
      .hero{grid-template-columns:1fr}
      .actions{justify-items:start}
    }
  </style>
</head>
<body>
<div class="wrap">
  <div class="hero">
    <div>
      <h1>币安 Alpha 助手</h1>
      <div class="muted">四倍分 / 稳定刷分 / 合约异动 / 官方日报</div>
      <div class="small muted" id="generatedAt"></div>
    </div>
    <div class="actions">
      <button class="tab" id="refreshBtn" type="button">刷新最新数据</button>
      <div class="small muted" id="refreshStatus">数据源：页面内嵌快照</div>
    </div>
  </div>
  <div class="cards" id="cards"></div>
  <div class="tabs">
    <button class="tab active" data-tab="q">四倍分</button>
    <button class="tab" data-tab="s">稳定刷分</button>
    <button class="tab" data-tab="f">合约异动</button>
    <button class="tab" data-tab="d">日报</button>
  </div>
  <section class="panel active" id="panel-q"></section>
  <section class="panel" id="panel-s"></section>
  <section class="panel" id="panel-f"></section>
  <section class="panel" id="panel-d"></section>
  <div class="small muted" id="warnings"></div>
</div>
<script>
let report = __REPORT_JSON__;

const num = (value, digits = 2) => {
  if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
  return Number(value).toLocaleString("en-US", { maximumFractionDigits: digits });
};
const pct = (value, digits = 2) => {
  if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
  return `${Number(value) > 0 ? "+" : ""}${Number(value).toFixed(digits)}%`;
};
const money = (value) => {
  if (value === null || value === undefined || Number.isNaN(Number(value))) return "-";
  const v = Number(value);
  if (Math.abs(v) >= 1e9) return `$${(v / 1e9).toFixed(2)}B`;
  if (Math.abs(v) >= 1e6) return `$${(v / 1e6).toFixed(2)}M`;
  if (Math.abs(v) >= 1e3) return `$${(v / 1e3).toFixed(2)}K`;
  return `$${v.toFixed(2)}`;
};
const klass = (value) => (Number(value) > 0 ? "good" : Number(value) < 0 ? "bad" : "warn");

const generatedAtEl = document.getElementById("generatedAt");
const refreshStatusEl = document.getElementById("refreshStatus");
const refreshBtnEl = document.getElementById("refreshBtn");

function renderReport() {
  generatedAtEl.textContent = `生成时间：${report.generated_at || "-"}`;

  document.getElementById("cards").innerHTML = [
    ["四倍分代币数", report.quadruple_points.token_count],
    ["四倍分 Alpha Trade 24h 总成交额", money(report.quadruple_points.total_volume_24h)],
    ["估算参与人数", num(report.quadruple_points.estimated_participants, 0)],
    ["Alpha 对应合约数", report.futures_alerts.matched_contract_count],
  ].map((item) => `<div class="card"><div class="label">${item[0]}</div><div class="value">${item[1]}</div></div>`).join("");

  document.getElementById("panel-q").innerHTML = `<h2>四倍分概览</h2><ul><li>默认按 ${num(report.assumptions.participant_volume_standard, 0)} / 人估算参与人数。</li><li>仅把官方 Alpha 列表中的 mulPoint = 4 识别为四倍分。</li><li>成交额口径统一使用 Alpha Trade 24h quoteVolume；Alpha 列表的 volume24h 仅作参考。</li></ul><table><thead><tr><th>代币</th><th>倍数</th><th>Alpha Trade 24h 成交额</th><th>24h 涨跌</th><th>24h 振幅</th><th>流动性</th><th>持有人</th><th>估算人数</th></tr></thead><tbody>${report.quadruple_points.tokens.map((item) => `<tr><td><strong>${item.symbol}</strong><div class="small muted">${item.alpha_trade_symbol || "-"} · 列表口径 ${money(item.token_list_volume24h)}</div></td><td>${item.mul_point}x</td><td>${money(item.alpha_trade_quote_volume24h)}</td><td class="${klass(item.percent_change_24h)}">${pct(item.percent_change_24h)}</td><td>${pct(item.amplitude_24h_pct)}</td><td>${money(item.liquidity)}</td><td>${num(item.holders, 0)}</td><td>${num(item.estimated_participants, 0)}</td></tr>`).join("")}</tbody></table>`;

  document.getElementById("panel-s").innerHTML = `<h2>稳定刷分推荐</h2><ul>${report.stable_candidates.summary.map((item) => `<li>${item}</li>`).join("")}</ul><table><thead><tr><th>代币</th><th>分数</th><th>Alpha Trade 24h 成交额</th><th>流动性</th><th>短周期波动</th><th>4h 振幅</th><th>审计</th><th>原因</th></tr></thead><tbody>${report.stable_candidates.recommendations.map((item) => `<tr><td><strong>${item.symbol}</strong></td><td>${num(item.stability_score)}</td><td>${money(item.stable_volume24h || item.alpha_trade_quote_volume24h || item.volume24h)}</td><td>${money(item.liquidity)}</td><td>${pct(item.realized_volatility_pct)}</td><td>${pct(item.amplitude_4h_pct)}</td><td>${item.audit_risk || "-"}</td><td>${(item.reason || []).join("<br>")}</td></tr>`).join("")}</tbody></table>`;

  document.getElementById("panel-f").innerHTML = `<h2>Alpha 合约异动</h2><table><thead><tr><th>Alpha / 合约</th><th>24h 涨跌</th><th>24h 成交额</th><th>资金费率</th><th>5m 持仓变化</th><th>分数</th><th>通知</th><th>原因</th></tr></thead><tbody>${report.futures_alerts.alerts.map((item) => `<tr><td><strong>${item.alpha_symbol}</strong><div class="small muted">${item.futures_symbol}</div></td><td class="${klass(item.price_change_percent_24h)}">${pct(item.price_change_percent_24h)}</td><td>${money(item.quote_volume_24h)}</td><td>${pct(item.funding_bps, 2).replace("%", " bps")}</td><td>${pct(item.open_interest_change_5m_pct)}</td><td>${num(item.alert_score)}</td><td>${item.should_notify ? '<span class="pill bad">建议通知</span>' : '<span class="pill">观察</span>'}</td><td>${(item.reasons || []).join("<br>")}</td></tr>`).join("")}</tbody></table>`;

  document.getElementById("panel-d").innerHTML = `<h2>Alpha 日报</h2><ul>${report.daily_brief.summary.map((item) => `<li>${item}</li>`).join("")}</ul><div class="grid"><div class="card"><h3>最近 Alpha 上线</h3><ul>${report.daily_brief.recent_alpha_listings.map((item) => `<li><strong>${item.symbol}</strong> · ${item.mul_point}x · ${item.listing_time || "-"} · 列表成交额 ${money(item.volume24h)}</li>`).join("")}</ul></div>${report.daily_brief.official_updates.map((catalog) => `<div class="card"><h3>${catalog.catalog_name}</h3><ul>${catalog.articles.map((article) => `<li><a href="${article.support_url}" target="_blank" rel="noreferrer">${article.title}</a><div class="small muted">${article.publish_time || "-"} · <a href="${article.api_url}" target="_blank">API</a></div><div class="small">${article.summary || ""}</div></li>`).join("")}</ul></div>`).join("")}</div>`;

  document.getElementById("warnings").innerHTML = report.warnings.length ? `Warnings:<br>${report.warnings.map((item) => `- ${item}`).join("<br>")}` : "Warnings: none";
}

async function fetchLatestReport() {
  const candidates = ["sample_report.json", "latest_report.json"];
  let lastError = null;

  for (const name of candidates) {
    try {
      const url = `${name}?t=${Date.now()}`;
      const response = await fetch(url, { cache: "no-store" });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      const data = await response.json();
      if (!data || !data.generated_at) throw new Error("Invalid report payload");
      report = data;
      refreshStatusEl.textContent = `数据源：${name} · 刷新于 ${new Date().toLocaleString()}`;
      renderReport();
      return;
    } catch (error) {
      lastError = error;
    }
  }
  throw lastError || new Error("No report JSON found");
}

refreshBtnEl.addEventListener("click", async () => {
  refreshBtnEl.disabled = true;
  refreshStatusEl.textContent = "正在刷新...";
  try {
    await fetchLatestReport();
  } catch (error) {
    refreshStatusEl.textContent = `刷新失败，仍显示本地快照：${error.message}`;
    renderReport();
  } finally {
    refreshBtnEl.disabled = false;
  }
});

document.querySelectorAll(".tab[data-tab]").forEach((button) => {
  button.addEventListener("click", () => {
    document.querySelectorAll(".tab[data-tab]").forEach((node) => node.classList.remove("active"));
    document.querySelectorAll(".panel").forEach((node) => node.classList.remove("active"));
    button.classList.add("active");
    document.getElementById(`panel-${button.dataset.tab}`).classList.add("active");
  });
});

renderReport();
fetchLatestReport().catch(() => {
  refreshStatusEl.textContent = "数据源：页面内嵌快照（尚未拉取到最新 JSON）";
});
</script>
</body>
</html>
