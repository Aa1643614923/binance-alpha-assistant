name: Refresh Demo Data

on:
  push:
    branches:
      - main
  schedule:
    # Every 5 minutes (UTC). GitHub Actions does not support schedules under 5 minutes.
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: refresh-demo-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate demo artifacts
        run: |
          python scripts/binance_alpha_assistant.py \
            --config config.example.json \
            --json-output demo/sample_report.json \
            --markdown-output demo/sample_report.md \
            --html-output demo/index.html

      - name: Validate futures data quality
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path("demo/sample_report.json").read_text(encoding="utf-8"))
          futures = report.get("futures_alerts") or {}
          matched = int(futures.get("matched_contract_count") or 0)
          warnings = report.get("warnings") or []
          warning_text = " | ".join(str(item) for item in warnings)

          if matched <= 0:
              print(f"Invalid futures report: matched_contract_count={matched}")
              sys.exit(1)
          if "futures_" in warning_text:
              print(f"Invalid futures report warnings: {warning_text}")
              sys.exit(1)
          print(f"Report quality OK: matched_contract_count={matched}")
          PY

      - name: Commit and push demo updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demo/sample_report.json demo/sample_report.md demo/index.html

          if git diff --cached --quiet; then
            echo "No demo changes detected."
            exit 0
          fi

          git commit -m "chore: auto-refresh demo data"
          git push
