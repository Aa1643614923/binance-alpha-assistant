name: Refresh Demo Data

on:
  push:
    branches:
      - main
  schedule:
    # Every 5 minutes (UTC). GitHub Actions does not support schedules under 5 minutes.
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: refresh-demo-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate demo artifacts
        run: |
          python scripts/binance_alpha_assistant.py \
            --config config.example.json \
            --json-output demo/sample_report.json \
            --markdown-output demo/sample_report.md \
            --html-output demo/index.html

      - name: Commit and push demo updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demo/sample_report.json demo/sample_report.md demo/index.html

          if git diff --cached --quiet; then
            echo "No demo changes detected."
            exit 0
          fi

          git commit -m "chore: auto-refresh demo data"
          git push
