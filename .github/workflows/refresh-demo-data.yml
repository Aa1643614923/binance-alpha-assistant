name: Refresh Demo Data

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # Every 5 minutes (UTC). GitHub Actions does not support schedules under 5 minutes.
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: refresh-demo-data
  cancel-in-progress: true

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Backup previous report snapshot
        run: |
          if [ -f demo/sample_report.json ]; then
            cp demo/sample_report.json demo/_previous_sample_report.json
          fi

      - name: Generate demo artifacts
        run: |
          python scripts/binance_alpha_assistant.py \
            --config config.example.json \
            --json-output demo/sample_report.json \
            --markdown-output demo/sample_report.md \
            --html-output demo/index.html

      - name: Repair futures snapshot fallback
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          report_path = Path("demo/sample_report.json")
          previous_path = Path("demo/_previous_sample_report.json")
          report = json.loads(report_path.read_text(encoding="utf-8"))
          futures = report.get("futures_alerts") or {}
          matched = int(futures.get("matched_contract_count") or 0)
          warnings = [str(item) for item in (report.get("warnings") or [])]
          has_futures_warning = any("futures_" in item for item in warnings)

          print(f"Current futures matched_contract_count={matched}")
          print(f"Current futures warning detected={has_futures_warning}")

          if matched > 0 and not has_futures_warning:
              print("Current futures snapshot is valid.")
          elif previous_path.exists():
              previous = json.loads(previous_path.read_text(encoding="utf-8"))
              previous_futures = previous.get("futures_alerts") or {}
              previous_matched = int(previous_futures.get("matched_contract_count") or 0)
              if previous_matched > 0:
                  report["futures_alerts"] = previous_futures
                  filtered_warnings = [item for item in warnings if "futures_" not in item]
                  filtered_warnings.append("futures_fallback: using previous valid futures snapshot")
                  report["warnings"] = filtered_warnings
                  print(f"Applied futures fallback with matched_contract_count={previous_matched}")
              else:
                  print("Previous snapshot exists but futures data is also invalid.")
          else:
              print("No previous snapshot found; keep current futures data.")

          report_path.write_text(json.dumps(report, ensure_ascii=False, indent=2), encoding="utf-8")
          PY

      - name: Validate final report quality
        run: |
          python - <<'PY'
          import json
          import sys
          from pathlib import Path

          report = json.loads(Path("demo/sample_report.json").read_text(encoding="utf-8"))
          futures = report.get("futures_alerts") or {}
          matched = int(futures.get("matched_contract_count") or 0)
          warnings = [str(item) for item in (report.get("warnings") or [])]
          blocking_warnings = [item for item in warnings if "futures_" in item and not item.startswith("futures_fallback:")]

          if matched <= 0:
              print(f"Invalid futures report after fallback: matched_contract_count={matched}")
              sys.exit(1)
          if blocking_warnings:
              print("Invalid futures warnings remain: " + " | ".join(blocking_warnings))
              sys.exit(1)
          print(f"Final report quality OK: matched_contract_count={matched}")
          PY

      - name: Commit and push demo updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add demo/sample_report.json demo/sample_report.md demo/index.html

          if git diff --cached --quiet; then
            echo "No demo changes detected."
            exit 0
          fi

          git commit -m "chore: auto-refresh demo data"
          git push
